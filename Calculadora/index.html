<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    
    <div class="calculadora">
        <article class="visor">1000</article>
        <div class="teclado">
            <button class="btnAC btn" id="btnAC">AC</button>
            <button class="btnvirgula btn" id="btnvirgula">,</button>
            <button class="btnDividir btn" id="btnDividir">/</button>
            <button class="btnpor btn" id="btnpor">%</button>
            <button class="btnMultiplicar btn" id="btnMultiplicar">*</button>
            <button class="btn7 btn" id="btn7">7</button>
            <button class="btn8 btn" id="btn8">8</button>
            <button class="btn9 btn" id="btn9">9</button>
            <button class="btnSubtrair btn" id="btnSubtrair">-</button>
            <button class="btn4 btn" id="btn4">4</button>
            <button class="btn5 btn" id="btn5">5</button>
            <button class="btn6 btn" id="btn6">6</button>
            <button class="btnAdicionar btn" id="btnAdicionar">+</button>
            <button class="btn1 btn" id="btn1">1</button>
            <button class="btn2 btn" id="btn2">2</button>
            <button class="btn3 btn" id="btn3">3</button>
            <button class="btnIgual btn" id="btnIgual">=</button>
            <button class="btn0 btn" id="btn0">0</button>
        </div>
    </div>
</body>
</html>
